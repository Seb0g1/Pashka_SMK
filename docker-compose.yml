services:
  postgres:
    image: postgres:16
    container_name: smk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smk
      POSTGRES_USER: smk
      POSTGRES_PASSWORD: smk_password
    ports:
      - "5433:5432"
    volumes:
      - smk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smk -d smk"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  smk_postgres_data:
